{% extends "base.html" %}
{% block title_extra %} &mdash; Оркестратор{% endblock %}
{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/orchestrator.css') }}">
{% endblock %}
{% block content %}
<div class="orchestrator-container">
    <h1 class="page-title">Оркестратор агентов</h1>
    
    <div class="orchestrator-grid">
        <div class="card">
            <h2>Задачи</h2>
            <div id="tasks-container">
                <div class="loading">Загрузка...</div>
            </div>
            <div class="card-actions">
                <button onclick="verifyAllTasks()" class="btn">Проверить все</button>
            </div>
        </div>
        
        <div class="card">
            <h2>Агенты</h2>
            <div id="agents-container">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
    </div>
    
    <div class="card create-task-card">
        <h2>Создать задачу</h2>
        <form id="create-task-form">
            <div class="form-row">
                <input type="text" id="task-title" placeholder="Название задачи" required>
            </div>
            <div class="form-row">
                <textarea id="task-description" placeholder="Описание" rows="2"></textarea>
            </div>
            <div class="form-row">
                <select id="task-zone">
                    <option value="parser">parser</option>
                    <option value="engine">engine</option>
                    <option value="model">model</option>
                    <option value="connection">connection</option>
                    <option value="report">report</option>
                    <option value="web">web</option>
                    <option value="cli">cli</option>
                </select>
                <input type="text" id="task-agent" placeholder="ID агента (опционально)">
            </div>
            <button type="submit" class="btn">Создать</button>
        </form>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/orchestrator.js') }}"></script>
{% endblock %}
